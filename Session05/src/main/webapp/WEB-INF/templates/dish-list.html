<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main-layout}">>
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
<div layout:fragment="content">

  <h2>Danh sách món ăn</h2>

  <div th:if="${dishes == null or #lists.isEmpty(dishes)}">
    Hiện tại nhà hàng đang cập nhật thực đơn, vui lòng quay lại sau
  </div>

  <table border="1" th:unless="${dishes == null or #lists.isEmpty(dishes)}">
    <tr>
      <th>ID</th>
      <th>Tên món</th>
      <th>Giá</th>
      <th>Trạng thái</th>
      <th>Hành động</th>
    </tr>

    <tr th:each="dish : ${dishes}">
      <td th:text="${dish.id}"></td>
      <td th:text="${dish.name}"></td>
      <td th:text="${dish.price}"></td>

      <td>
        <span th:if="${dish.available}">Còn hàng</span>
        <span th:unless="${dish.available}" style="color:red;">Hết hàng</span>
      </td>

      <td>
        <a th:href="@{/bai3/edit/{id}(id=${dish.id})}">
          Chỉnh sửa
        </a>
      </td>
    </tr>
  </table>

</div>
</body>
</html>
