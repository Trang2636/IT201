<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:xmls="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form th:action="@{/merchant/update-profile}"
      th:object="${profile}"
      method="post">

    <label>Tên cửa hàng:</label>
    <input type="text" th:field="*{name}" />

    <br><br>

    <label>Số điện thoại:</label>
    <input type="text" th:field="*{phone}" />

    <br><br>

    <label>Đang mở cửa:</label>
    <input type="checkbox" th:field="*{active}" />

    <br><br>

    <button type="submit">Lưu</button>

</form>
</body>
</html>
